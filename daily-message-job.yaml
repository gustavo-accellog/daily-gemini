kind: ConfigMap
apiVersion: v1
metadata:
  name: config-system-instruction
  namespace: desenvolvimento
data:
  system-instruction.txt: |
    Você é um lider técnico de uma empresa de desenvolvimento de softwares.
    Nome: Daily
    Sua Especialidade: Infraestrutura, Linux, Kubernetes, Docker, Oracle Cloud.
    Banco de Dados: Postgresql.
    Especialidade do Time de Desenvolvimento: PHP, Java, Laravel, VueJS.
    Reunião diária: 09:00
    Perguntas Utilizadas: O que você fez ontem? O que irá fazer hoje? Está com alguma dificuldade e precisa de ajuda?
    Todo dia você envia uma mensagem diária para motivar o time. Você utiliza linguagem informal. Gosta de brincar sobre desenvolvimento, porém mantém frases sempre positivas.
    Sempre lembre o time da importância da reunião diária e em formatar a melhor expliãcaço de suas atividades para esta reunião.
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: config-content
  namespace: desenvolvimento
data:
  content.txt: |
    Hoje é {{DATE_CONTEXT}}.{{SPECIAL_DATE}} Escreva uma mensagem motivacional para o time de desenvolvimento. Fale seu nome. Utilize a formatação de texto com html.
---
kind: ConfigMap
apiVersion: v1
metadata:
  name: config-special-dates
  namespace: desenvolvimento
data:
  special-dates.json: |
    {
      "special_dates": [
        { "type": "annual", "month": 1,  "day": 1,  "name": "Ano Novo",                 "message_hint": "Feliz Ano Novo! Celebre as conquistas do ano passado e inspire o time para os desafios do novo ano." },
        { "type": "annual", "month": 4,  "day": 21, "name": "Tiradentes",               "message_hint": "Lembre o time sobre a importância de lutar pelos ideais e pela qualidade do que entregamos." },
        { "type": "annual", "month": 5,  "day": 1,  "name": "Dia do Trabalho",          "message_hint": "Parabenize o time pelo trabalho dedicado e celebre o valor de cada contribuição." },
        { "type": "annual", "month": 9,  "day": 7,  "name": "Independência do Brasil",  "message_hint": "Inspire o time com o espírito de independência e autonomia no trabalho." },
        { "type": "annual", "month": 10, "day": 12, "name": "Nossa Senhora Aparecida",  "message_hint": "Deseje um feliz feriado ao time." },
        { "type": "annual", "month": 11, "day": 2,  "name": "Finados",                  "message_hint": "Honre a memória de quem veio antes e deixou legado." },
        { "type": "annual", "month": 11, "day": 15, "name": "Proclamação da República", "message_hint": "Fale sobre trabalho em conjunto e construção coletiva." },
        { "type": "annual", "month": 11, "day": 20, "name": "Consciência Negra",        "message_hint": "Celebre a diversidade e a riqueza cultural do time." },
        { "type": "annual", "month": 12, "day": 25, "name": "Natal",                    "message_hint": "Feliz Natal! Deseje paz, alegria e descanso merecido ao time." }
      ]
    }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-message
  namespace: desenvolvimento
spec:
  timeZone: "America/Sao_Paulo"
  schedule: "0 6 * * 1-5"
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 0
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: daily-message
            image: your-docker-registry/daily-message:latest  # Substitua pelo nome da sua imagem
            env:
            - name: GEMINI_KEY
              value: informeachave
            - name: GOOGLE_CHAT_URL
              value: informeaurl
            - name: PATH_SYSTEMINSTRUCTION
              value: "/files/system-instruction.txt"
            - name: PATH_CONTENT
              value: "/files/content.txt"
            - name: PATH_SPECIAL_DATES
              value: "/files/special-dates.json"
            command:
            - /bin/sh
            - -c
            - python -u app.py
            volumeMounts:
            - name: file-system-instruction
              mountPath: /files/system-instruction.txt
              subPath: system-instruction.txt
            - name: file-content
              mountPath: /files/content.txt
              subPath: content.txt
            - name: file-special-dates
              mountPath: /files/special-dates.json
              subPath: special-dates.json
          restartPolicy: OnFailure
          volumes:
          - name: file-system-instruction
            configMap:
              name: config-system-instruction
          - name: file-content
            configMap:
              name: config-content
          - name: file-special-dates
            configMap:
              name: config-special-dates
          # imagePullSecrets:
          # - name: desenvolvimento-ocir-secret